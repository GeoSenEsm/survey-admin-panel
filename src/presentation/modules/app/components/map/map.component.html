<div class="container">
  <app-map-filters
    (loadDataCallback)="loadData($event)"
    [respondents]="respondents"
    [surveys]="surveys"
    [canExport]="locationData.length > 0"
    (exportDataCallback)="exportData()"
  />
  <div style="height: 10px"></div>

  <div class="map-provider-selector">
    <mat-form-field appearance="fill">
      <mat-label>{{ 'configuration.mapProvider.label' | translate }}</mat-label>
      <mat-select [value]="selectedMapProvider" (selectionChange)="changeMapProvider($event.value)">
        <mat-option *ngFor="let provider of mapProviders" [value]="provider.value">
          {{ provider.labelKey | translate }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="spinner-container" *ngIf="isBusy">
    <div class="loading-content">
      <mat-spinner diameter="50" />
      <div class="progress-info">
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        <div class="progress-text">
          <span>Downloaded: {{ formatBytes(downloadedBytes) }}</span>
        </div>
      </div>
    </div>
  </div>

  <div id="map"></div>
</div>
